<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IBM Wallpaper</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #073E85; }
canvas { display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; }

#brand-icon {
  position: fixed;
  top: 16px;
  left: 16px;
  z-index: 130;
  width: 46px;
  height: 46px;
  background: transparent;
  border: 0;
  color: transparent;
  font-size: 0;
  cursor: pointer;
}

#panel-tab {
  position: fixed;
  right: 0;
  top: 50%;
  transform: translateY(-50%);
  width: 14px;
  height: 50px;
  background: rgba(255,255,255,0.08);
  border-radius: 4px 0 0 4px;
  cursor: pointer;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.3s, right 0.4s cubic-bezier(0.4,0,0.2,1);
}
#panel-tab:hover { background: rgba(255,255,255,0.2); }
#panel-tab::after {
  content: '';
  border: solid rgba(255,255,255,0.5);
  border-width: 0 1.5px 1.5px 0;
  display: inline-block;
  padding: 2.5px;
  transform: rotate(135deg);
  transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
}
#panel-tab.open { right: 320px; }
#panel-tab.open::after { transform: rotate(-45deg); }

#panel {
  position: fixed;
  right: -320px;
  top: 0;
  width: 320px;
  height: 100%;
  background: rgba(7, 30, 65, 0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  z-index: 99;
  transition: right 0.4s cubic-bezier(0.4,0,0.2,1);
  padding: 40px 20px;
  font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  color: rgba(255,255,255,0.85);
  display: flex;
  flex-direction: column;
  gap: 20px;
  border-left: 1px solid rgba(255,255,255,0.06);
  overflow-y: auto;
}
#panel.open { right: 0; }

.panel-title {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.35);
  margin-bottom: 12px;
  font-weight: 500;
}
.panel-section { display: flex; flex-direction: column; gap: 6px; }
.panel-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.toggle-container {
  display: flex;
  gap: 0;
  border-radius: 6px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.1);
}
.toggle-btn {
  flex: 1;
  padding: 10px 6px;
  background: transparent;
  color: rgba(255,255,255,0.4);
  border: none;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.3s;
  font-family: inherit;
  font-weight: 400;
  letter-spacing: 0.5px;
}
.toggle-btn.active {
  background: rgba(74, 162, 230, 0.2);
  color: rgba(255,255,255,0.9);
}
.toggle-btn:hover:not(.active) {
  background: rgba(255,255,255,0.04);
  color: rgba(255,255,255,0.6);
}

.slider-label {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: rgba(255,255,255,0.4);
}
.slider-val {
  color: rgba(74, 162, 230, 0.8);
  font-variant-numeric: tabular-nums;
}
input[type="range"] {
  -webkit-appearance: none;
  width: 100%;
  height: 3px;
  border-radius: 2px;
  background: rgba(255,255,255,0.08);
  outline: none;
  margin-top: 6px;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #4AA2E6;
  cursor: pointer;
  border: 2px solid rgba(255,255,255,0.15);
  box-shadow: 0 0 8px rgba(74, 162, 230, 0.3);
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="brand-icon" aria-label="Settings"></div>

<div id="panel-tab" onclick="togglePanel()"></div>
<div id="panel">
  <div class="panel-section">
    <div class="panel-title">Logo Style</div>
    <div class="toggle-container">
      <button class="toggle-btn active" id="btn-classic" onclick="setLogo('classic')">Classic</button>
      <button class="toggle-btn" id="btn-rebus" onclick="setLogo('rebus')">Rebus</button>
    </div>
  </div>
  <div class="panel-section">
    <div class="panel-title">Global Motion</div>
    <div class="slider-label"><span>Slow</span><span class="slider-val" id="anim-speed-val">56%</span><span>Fast</span></div>
    <input type="range" id="anim-speed" min="20" max="220" value="56" oninput="updateAnimationSpeed(this.value)">
  </div>
  <div class="panel-section">
    <div class="panel-title">Logo Counts</div>
    <div class="panel-grid-2">
      <div>
        <div class="slider-label"><span>Large</span><span class="slider-val" id="count-large-val">1</span></div>
        <input type="range" id="count-large" min="0" max="4" value="1" oninput="updateCount('large', this.value)">
      </div>
      <div>
        <div class="slider-label"><span>Medium</span><span class="slider-val" id="count-medium-val">2</span></div>
        <input type="range" id="count-medium" min="0" max="6" value="2" oninput="updateCount('medium', this.value)">
      </div>
      <div>
        <div class="slider-label"><span>Small</span><span class="slider-val" id="count-small-val">3</span></div>
        <input type="range" id="count-small" min="0" max="10" value="3" oninput="updateCount('small', this.value)">
      </div>
      <div>
        <div class="slider-label"><span>Tiny</span><span class="slider-val" id="count-tiny-val">5</span></div>
        <input type="range" id="count-tiny" min="0" max="16" value="5" oninput="updateCount('tiny', this.value)">
      </div>
    </div>
  </div>
  <div class="panel-section">
    <div class="panel-title">Logo Sizes</div>
    <div class="panel-grid-2">
      <div>
        <div class="slider-label"><span>Large</span><span class="slider-val" id="size-large-val">47%</span></div>
        <input type="range" id="size-large" min="20" max="120" value="47" oninput="updateSize('large', this.value)">
      </div>
      <div>
        <div class="slider-label"><span>Medium</span><span class="slider-val" id="size-medium-val">32%</span></div>
        <input type="range" id="size-medium" min="10" max="80" value="32" oninput="updateSize('medium', this.value)">
      </div>
      <div>
        <div class="slider-label"><span>Small</span><span class="slider-val" id="size-small-val">12%</span></div>
        <input type="range" id="size-small" min="4" max="40" value="12" oninput="updateSize('small', this.value)">
      </div>
      <div>
        <div class="slider-label"><span>Tiny</span><span class="slider-val" id="size-tiny-val">7%</span></div>
        <input type="range" id="size-tiny" min="2" max="24" value="7" oninput="updateSize('tiny', this.value)">
      </div>
    </div>
  </div>
  <div class="panel-section">
    <div class="panel-title">Logo Randomness</div>
    <div class="slider-label"><span>Uniform</span><span class="slider-val" id="logo-random-val">100%</span><span>Chaotic</span></div>
    <input type="range" id="logo-random" min="0" max="100" value="100" oninput="updateLogoRandomness(this.value)">
  </div>
  <div class="panel-section">
    <div class="panel-title">Highlight</div>
    <div class="slider-label"><span>Base Size</span><span class="slider-val" id="hl-size-val">115%</span></div>
    <input type="range" id="hl-size" min="20" max="120" value="115" oninput="updateHighlight('baseSize', this.value)">
    <div class="slider-label"><span>Move Speed</span><span class="slider-val" id="hl-move-speed-val">36%</span></div>
    <input type="range" id="hl-move-speed" min="20" max="220" value="36" oninput="updateHighlight('moveSpeed', this.value)">
    <div class="slider-label"><span>Move Randomness</span><span class="slider-val" id="hl-move-rand-val">18%</span></div>
    <input type="range" id="hl-move-rand" min="0" max="100" value="18" oninput="updateHighlight('moveRandomness', this.value)">
    <div class="slider-label"><span>Size Speed</span><span class="slider-val" id="hl-size-speed-val">51%</span></div>
    <input type="range" id="hl-size-speed" min="20" max="220" value="51" oninput="updateHighlight('sizeSpeed', this.value)">
    <div class="slider-label"><span>Size Randomness</span><span class="slider-val" id="hl-size-rand-val">90%</span></div>
    <input type="range" id="hl-size-rand" min="0" max="100" value="90" oninput="updateHighlight('sizeRandomness', this.value)">
  </div>
</div>

// --- Load images ---
function loadImages() {
  classicImg = new Image();
  classicImg.onload = () => { imagesLoaded++; if (imagesLoaded >= 2) init(); };
  classicImg.src = 'data:image/svg+xml;base64,' + btoa(classicSVGStr);

  rebusImg.onload = () => { imagesLoaded++; if (imagesLoaded >= 2) init(); };

// --- Resize ---
let prevW = 0, prevH = 0;
function resize() {
  const dpr = devicePixelRatio;
  const w = window.innerWidth * dpr;
  const h = window.innerHeight * dpr;
  if (canvas.width !== w || canvas.height !== h) {
    canvas.width = w;
    canvas.height = h;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
  }
}
window.addEventListener('resize', resize);
resize();

// --- Helpers ---
function lerp(a, b, t) { return a + (b - a) * t; }

function getAnchorPosition(tier, index, vw, vh) {
  const anchors = {
    large: [[0.26, 0.28], [0.22, 0.36], [0.34, 0.24]],
    medium: [[0.74, 0.72], [0.7, 0.66], [0.78, 0.78]],
    small: [[0.52, 0.5], [0.45, 0.62], [0.6, 0.4]],
    tiny: [[0.16, 0.42], [0.62, 0.82], [0.86, 0.34], [0.52, 0.18], [0.38, 0.76], [0.8, 0.62]]
  };
  const pair = anchors[tier][index % anchors[tier].length];
  return { x: pair[0] * vw, y: pair[1] * vh };
}

// Pre-render a logo with gradient fade to an offscreen canvas
function renderLogoWithGradient(img, w, h, gradAngle, opacity) {
  const oc = document.createElement('canvas');
  oc.width = Math.ceil(w);
  oc.height = Math.ceil(h);
  const octx = oc.getContext('2d');

  // Draw the logo
  octx.drawImage(img, 0, 0, w, h);

  // Apply gradient fade (erase part of the logo with a gradient)
  octx.globalCompositeOperation = 'destination-in';
  const cx = w / 2, cy = h / 2;
  const len = Math.sqrt(w * w + h * h) * 0.5;
  const gx1 = cx - Math.cos(gradAngle) * len;
  const gy1 = cy - Math.sin(gradAngle) * len;
  const gx2 = cx + Math.cos(gradAngle) * len;
  const gy2 = cy + Math.sin(gradAngle) * len;
  const grad = octx.createLinearGradient(gx1, gy1, gx2, gy2);
  grad.addColorStop(0, `rgba(255,255,255,1)`);
  grad.addColorStop(0.6, `rgba(255,255,255,0.6)`);
  grad.addColorStop(1, `rgba(255,255,255,0)`);
  octx.fillStyle = grad;
  octx.fillRect(0, 0, w, h);

  return oc;
}

// --- Logo particle ---
function createLogo(tier, fadeIn, index = 0, existing = []) {
  const r = settings.logoRandomness;
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const diag = Math.sqrt(vw * vw + vh * vh);
  const minDim = Math.min(vw, vh);
  const baseSize = settings.sizes[tier] * diag;
  const jitter = baseSize * lerp(0.04, 0.22, r) * (Math.random() - 0.5);
  const size = Math.max(16, baseSize + jitter);
  const opacityByTier = { large: 0.11, medium: 0.13, small: 0.16, tiny: 0.2 };
  const maxOpacity = Math.max(0.04, opacityByTier[tier] * lerp(0.7, 1.3, Math.random()));
  const angleSpread = lerp(8, 55, r) * (Math.PI / 180);
  const rotation = (Math.random() - 0.5) * 2 * angleSpread;
  const rotSpeed = lerp(0.000008, 0.00005, r) * (Math.random() - 0.5) * 2;
  const gradAngle = Math.random() * Math.PI * 2;
  const margin = size * 0.12;
  const jitterSpread = minDim * lerp(0.015, 0.18, r);
  let targetX = vw * 0.5;
  let targetY = vh * 0.5;
  let found = false;
  for (let attempt = 0; attempt < 36; attempt++) {
    const anchor = getAnchorPosition(tier, index + attempt, vw, vh);
    const spreadMul = 1 + attempt * 0.14;
    const cx = Math.max(margin, Math.min(vw - margin, anchor.x + (Math.random() - 0.5) * jitterSpread * spreadMul));
    const cy = Math.max(margin, Math.min(vh - margin, anchor.y + (Math.random() - 0.5) * jitterSpread * spreadMul));
    let ok = true;
    for (const o of existing) {
      if (o.dying) continue;
      const ox = (typeof o.targetX === 'number') ? o.targetX : o.x;
      const oy = (typeof o.targetY === 'number') ? o.targetY : o.y;
      const dx = cx - ox;
      const dy = cy - oy;
      const d = Math.sqrt(dx * dx + dy * dy);
      const minDist = (size + o.size) * 0.24;
      if (d < minDist) {
        ok = false;
        break;
      }
    }
    if (ok) {
      targetX = cx;
      targetY = cy;
      found = true;
      break;
    }
  }
  if (!found) {
    targetX = lerp(margin, Math.max(margin, vw - margin), Math.random());
    targetY = lerp(margin, Math.max(margin, vh - margin), Math.random());
  }

  return {
    tier,
    x: targetX,
    y: targetY,
    targetX,
    targetY,
    landed: true,
    size,
    rotation,
    rotSpeed,
    maxOpacity,
    opacity: 0,
    fadeState: 'in',
    fadeInDuration: fadeIn ? lerp(1800, 3800, Math.random()) : lerp(2600, 4600, Math.random()),
    fadeOutDuration: lerp(2800, 5200, Math.random()),
    life: 0,
    lifespan: lerp(26000, 46000, Math.random()),
    gradAngle,
    logo: currentLogo,
    dying: false,
    offscreen: null,
  };
}

// --- Panel ---
function togglePanel() {
  panelOpen = !panelOpen;
  document.getElementById('panel').classList.toggle('open', panelOpen);
  document.getElementById('panel-tab').classList.toggle('open', panelOpen);
}

document.addEventListener('click', (e) => {
  if (
    panelOpen &&
    !document.getElementById('panel').contains(e.target) &&
    !document.getElementById('panel-tab').contains(e.target) &&
    !document.getElementById('brand-icon').contains(e.target)
  ) {
    panelOpen = false;
    document.getElementById('panel').classList.remove('open');
    document.getElementById('panel-tab').classList.remove('open');
  }
});

function setLogo(type) {
  if (type === currentLogo) return;
  currentLogo = type;
  document.getElementById('btn-classic').classList.toggle('active', type === 'classic');
  document.getElementById('btn-rebus').classList.toggle('active', type === 'rebus');
  for (const l of logos) {
    l.dying = true;
    l.fadeState = 'out';
  }
}

function updateAnimationSpeed(val) {
  settings.animationSpeed = parseInt(val, 10) / 100;
  document.getElementById('anim-speed-val').textContent = `${val}%`;
}

function updateCount(tier, val) {
  settings.counts[tier] = parseInt(val, 10);
  document.getElementById(`count-${tier}-val`).textContent = val;
}

function updateSize(tier, val) {
  settings.sizes[tier] = parseInt(val, 10) / 100;
  document.getElementById(`size-${tier}-val`).textContent = `${val}%`;
}

function updateLogoRandomness(val) {
  settings.logoRandomness = parseInt(val, 10) / 100;
  document.getElementById('logo-random-val').textContent = `${val}%`;
}

function updateHighlight(kind, val) {
  const n = parseInt(val, 10);
  if (kind === 'baseSize') {
    settings.highlight.baseSize = n / 100;
    document.getElementById('hl-size-val').textContent = `${n}%`;
  } else if (kind === 'moveSpeed') {
    settings.highlight.moveSpeed = n / 100;
    document.getElementById('hl-move-speed-val').textContent = `${n}%`;
  } else if (kind === 'moveRandomness') {
    settings.highlight.moveRandomness = n / 100;
    document.getElementById('hl-move-rand-val').textContent = `${n}%`;
  } else if (kind === 'sizeSpeed') {
    settings.highlight.sizeSpeed = n / 100;
    document.getElementById('hl-size-speed-val').textContent = `${n}%`;
  } else if (kind === 'sizeRandomness') {
    settings.highlight.sizeRandomness = n / 100;
    document.getElementById('hl-size-rand-val').textContent = `${n}%`;
  }
}

function markExcessForRemoval() {
  for (const tier of tiers) {
    const alive = logos.filter((l) => l.tier === tier && !l.dying);
    const extra = Math.max(0, alive.length - settings.counts[tier]);
    for (let i = 0; i < extra; i++) {
      alive[i].dying = true;
      alive[i].fadeState = 'out';
    }
  }
}

function spawnMissingLogos() {
  for (const tier of tiers) {
    const aliveCount = logos.filter((l) => l.tier === tier && !l.dying).length;
    const needed = Math.max(0, settings.counts[tier] - aliveCount);
    for (let i = 0; i < Math.min(2, needed); i++) {
      logos.push(createLogo(tier, true, aliveCount + i, logos));
    }
  }
}

// --- Animation ---
let lastTime = 0;

function drawBackground(dt) {
  const w = canvas.width;
  const h = canvas.height;
  const maxDim = Math.max(w, h);
  const dtMul = Math.max(0.2, Math.min(dt / 16.67, 3));
  const moveSpeed = settings.animationSpeed * settings.highlight.moveSpeed;
  const moveRand = settings.highlight.moveRandomness;
  const sizeSpeed = settings.animationSpeed * settings.highlight.sizeSpeed;
  const sizeRand = settings.highlight.sizeRandomness;
  const baseSize = settings.highlight.baseSize;

  ctx.fillStyle = '#073E85';
  ctx.fillRect(0, 0, w, h);

  const mainBlob = blobs[0];
  mainBlob.px += mainBlob.sx * dtMul * moveSpeed;
  mainBlob.py += mainBlob.sy * dtMul * moveSpeed;
  mainBlob.rPhase += mainBlob.rSpeed * dtMul * sizeSpeed;
  const mx = (mainBlob.x + Math.sin(mainBlob.px) * mainBlob.ax * lerp(0.35, 1.7, moveRand)) * w;
  const my = mainBlob.y * h;
  const mr = ((mainBlob.baseR * baseSize) + Math.sin(mainBlob.rPhase) * mainBlob.rAmp * lerp(0.2, 1.6, sizeRand)) * maxDim;

  const mainGrad = ctx.createRadialGradient(mx, my, 0, mx, my, mr);
  mainGrad.addColorStop(0, '#4AA2E6');
  mainGrad.addColorStop(0.35, '#2D7CC5');
  mainGrad.addColorStop(0.65, '#1E59A6');
  mainGrad.addColorStop(1, '#073E85');
  ctx.fillStyle = mainGrad;
  ctx.fillRect(0, 0, w, h);

  for (let i = 1; i < blobs.length; i++) {
    const b = blobs[i];
    b.px += b.sx * dtMul * moveSpeed;
    b.py += b.sy * dtMul * moveSpeed;
    b.rPhase += b.rSpeed * dtMul * sizeSpeed;
    const bx = (b.x + Math.sin(b.px) * b.ax * lerp(0.35, 1.8, moveRand)) * w;
    const by = b.y * h;
    const radius = ((b.baseR * baseSize) + Math.sin(b.rPhase) * b.rAmp * lerp(0.2, 1.5, sizeRand)) * maxDim;

    const grad = ctx.createRadialGradient(bx, by, 0, bx, by, radius);
    grad.addColorStop(0, 'rgba(74, 162, 230, 0.12)');
    grad.addColorStop(0.4, 'rgba(45, 124, 197, 0.05)');
    grad.addColorStop(1, 'rgba(7, 62, 133, 0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);
  }
}

function update(timestamp) {
  if (!lastTime) lastTime = timestamp;
  const dt = Math.min(timestamp - lastTime, 50);
  lastTime = timestamp;

  resize();
  const dpr = devicePixelRatio;
  const speedMul = settings.animationSpeed;

  drawBackground(dt);

  markExcessForRemoval();
  spawnMissingLogos();

  const toRemove = [];
  for (let i = 0; i < logos.length; i++) {
    const l = logos[i];
    l.life += dt;

    if (l.fadeState === 'in') {
      l.opacity = l.maxOpacity * Math.min(1, l.life / l.fadeInDuration);
      if (l.life >= l.fadeInDuration) l.fadeState = 'hold';
    } else if (l.fadeState === 'hold') {
      l.opacity = l.maxOpacity;
      if (l.life >= l.lifespan - l.fadeOutDuration) l.fadeState = 'out';
    } else if (l.fadeState === 'out') {
      if (l.dying) {
        l.opacity -= dt * 0.0002;
      } else {
        const remaining = l.lifespan - l.life;
        l.opacity = l.maxOpacity * Math.max(0, remaining / l.fadeOutDuration);
      }
    }

    if (l.opacity <= 0) {
      toRemove.push(i);
      continue;
    }

    l.x = l.targetX;
    l.y = l.targetY;
    l.rotation += l.rotSpeed * dt * speedMul;

    const img = l.logo === 'classic' ? classicImg : rebusImg;
    const aspect = img.naturalWidth / img.naturalHeight;
    let drawW, drawH;
    if (l.logo === 'classic') {
      drawW = l.size * dpr;
      drawH = drawW / aspect;
    } else {
      drawH = l.size * dpr;
      drawW = drawH * aspect;
    }

    if (!l.offscreen) {
      l.offscreen = renderLogoWithGradient(img, Math.ceil(drawW), Math.ceil(drawH), l.gradAngle, 1);
    }

    ctx.save();
    ctx.globalCompositeOperation = 'overlay';
    ctx.globalAlpha = Math.max(0, Math.min(1, l.opacity));
    ctx.translate(l.x * dpr, l.y * dpr);
    ctx.rotate(l.rotation);
    ctx.drawImage(l.offscreen, -drawW / 2, -drawH / 2, drawW, drawH);
    ctx.restore();
  }

  for (let i = toRemove.length - 1; i >= 0; i--) {
    logos.splice(toRemove[i], 1);
  }

  requestAnimationFrame(update);
}

function init() {
  logos = [];
  for (const tier of tiers) {
    for (let i = 0; i < settings.counts[tier]; i++) {
      const l = createLogo(tier, true, i, logos);
      l.life = 0;
      logos.push(l);
    }
  }
  requestAnimationFrame(update);
}

loadImages();
</script>
