<svg width="2880" height="1880" viewBox="0 0 2880 1880" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Animated IBM-style background">
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="2880" y2="1880" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#031a33"/>
      <stop offset="0.5" stop-color="#05306B"/>
      <stop offset="1" stop-color="#0A5EB0"/>
    </linearGradient>

    <radialGradient id="glowLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(540 1180) rotate(5) scale(1250 980)">
      <stop offset="0" stop-color="#7AD1FF" stop-opacity="0.62"/>
      <stop offset="1" stop-color="#7AD1FF" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(2330 580) rotate(-12) scale(1200 900)">
      <stop offset="0" stop-color="#9CC4FF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#9CC4FF" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="corePulse" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1500 980) rotate(22) scale(920 640)">
      <stop offset="0" stop-color="#BEEBFF" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#BEEBFF" stop-opacity="0"/>
    </radialGradient>

    <pattern id="ibmGrid" width="72" height="72" patternUnits="userSpaceOnUse">
      <path d="M72 0H0V72" stroke="white" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>

    <pattern id="scanlines" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="1" fill="white" fill-opacity="0.04"/>
    </pattern>

    <filter id="softBlur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="26"/>
    </filter>

    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" seed="7" result="noise">
        <animate attributeName="seed" values="7;19;7" dur="20s" repeatCount="indefinite"/>
      </feTurbulence>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.035"/>
      </feComponentTransfer>
    </filter>

    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#BCE8FF" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#BCE8FF" stop-opacity="0.52"/>
      <stop offset="1" stop-color="#BCE8FF" stop-opacity="0"/>
    </linearGradient>

    <symbol id="spark" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="2.2" fill="white"/>
      <circle cx="12" cy="12" r="6.3" fill="white" fill-opacity="0.22"/>
    </symbol>

    <symbol id="ibmMark" viewBox="0 0 240 86">
      <text x="0" y="62" fill="white" fill-opacity="0.42" font-size="64" font-weight="700" font-family="'IBM Plex Sans', Arial, sans-serif" letter-spacing="1.8">IBM</text>
    </symbol>
  </defs>

  <rect width="2880" height="1880" fill="url(#bgGradient)"/>

  <g>
    <rect width="2880" height="1880" fill="url(#glowLeft)">
      <animateTransform attributeName="transform" type="translate" values="0 0;120 -90;260 -40;120 80;-60 100;0 0" dur="46s" repeatCount="indefinite"/>
    </rect>
    <rect width="2880" height="1880" fill="url(#glowRight)">
      <animateTransform attributeName="transform" type="translate" values="0 0;-180 120;-240 -20;-80 -160;120 -100;0 0" dur="52s" repeatCount="indefinite"/>
    </rect>
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0;280 -140;420 120;140 280;-220 180;-320 -110;-80 -220;0 0" dur="58s" repeatCount="indefinite"/>
      <rect width="2880" height="1880" fill="url(#corePulse)">
        <animate attributeName="opacity" values="0.34;0.72;0.28;0.66;0.34" dur="17s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="scale" values="1 1;1.12 1.07;0.94 0.98;1.08 1.02;1 1" dur="19s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <g style="mix-blend-mode:screen" opacity="0.56">
    <rect x="-400" y="220" width="3600" height="240" transform="rotate(-14 1440 940)" fill="url(#beam)" filter="url(#softBlur)">
      <animateTransform attributeName="transform" type="translate" values="-220 130;240 -120;-220 130" dur="32s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="0.36;0.62;0.36" dur="12s" repeatCount="indefinite"/>
    </rect>

    <rect x="-600" y="1220" width="3900" height="170" transform="rotate(-14 1440 940)" fill="url(#beam)" filter="url(#softBlur)" opacity="0.72">
      <animateTransform attributeName="transform" type="translate" values="260 -140;-220 120;260 -140" dur="37s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="0.3;0.58;0.3" dur="13s" repeatCount="indefinite"/>
    </rect>
  </g>

  <g opacity="0.08">
    <rect width="2880" height="1880" fill="url(#ibmGrid)">
      <animateTransform attributeName="transform" type="translate" values="0 0;72 72;0 0" dur="40s" repeatCount="indefinite"/>
    </rect>
  </g>

  <g opacity="0.06">
    <rect width="2880" height="1880" fill="url(#scanlines)">
      <animateTransform attributeName="transform" type="translate" values="0 0;0 8;0 0" dur="1.6s" repeatCount="indefinite"/>
    </rect>
  </g>

  <g opacity="0.24" style="mix-blend-mode:screen">
    <use href="#ibmMark" x="380" y="300">
      <animateTransform attributeName="transform" type="translate" values="0 0;120 80;220 160;90 240;-40 180;0 0" dur="92s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="0.2;0.38;0.2" dur="24s" repeatCount="indefinite"/>
    </use>
  </g>

  <g opacity="0.16" style="mix-blend-mode:screen">
    <g transform="translate(1970 1220) scale(0.32)">
      <use href="#ibmMark">
        <animateTransform attributeName="transform" type="translate" values="0 0;-110 -70;-190 -130;-70 -180;30 -110;0 0" dur="108s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.14;0.28;0.14" dur="30s" repeatCount="indefinite"/>
      </use>
    </g>
  </g>

  <g opacity="0.12" style="mix-blend-mode:screen">
    <g transform="translate(260 760) scale(0.075)">
      <animateTransform attributeName="transform" type="translate" values="0 0;140 -50;220 10;120 110;0 0" dur="86s" repeatCount="indefinite" additive="sum"/>
      <use href="#ibmMark">
        <animate attributeName="opacity" values="0.12;0.24;0.12" dur="22s" repeatCount="indefinite"/>
      </use>
    </g>
    <g transform="translate(1360 1540) scale(0.07)">
      <animateTransform attributeName="transform" type="translate" values="0 0;160 -70;260 -20;130 90;0 0" dur="92s" repeatCount="indefinite" additive="sum"/>
      <use href="#ibmMark">
        <animate attributeName="opacity" values="0.11;0.22;0.11" dur="24s" repeatCount="indefinite"/>
      </use>
    </g>
    <g transform="translate(2360 620) scale(0.075)">
      <animateTransform attributeName="transform" type="translate" values="0 0;-150 60;-240 0;-120 -100;0 0" dur="88s" repeatCount="indefinite" additive="sum"/>
      <use href="#ibmMark">
        <animate attributeName="opacity" values="0.12;0.23;0.12" dur="23s" repeatCount="indefinite"/>
      </use>
    </g>
    <g transform="translate(1740 300) scale(0.065)">
      <animateTransform attributeName="transform" type="translate" values="0 0;-130 80;-210 30;-100 -90;0 0" dur="90s" repeatCount="indefinite" additive="sum"/>
      <use href="#ibmMark">
        <animate attributeName="opacity" values="0.1;0.2;0.1" dur="25s" repeatCount="indefinite"/>
      </use>
    </g>
  </g>

  <g opacity="0.46">
    <use href="#spark" x="360" y="350">
      <animateTransform attributeName="transform" type="translate" values="0 0;130 90;0 0" dur="46s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="14s" repeatCount="indefinite"/>
    </use>
    <use href="#spark" x="1280" y="420">
      <animateTransform attributeName="transform" type="translate" values="0 0;180 50;0 0" dur="62s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="18s" repeatCount="indefinite"/>
    </use>
    <use href="#spark" x="2220" y="300">
      <animateTransform attributeName="transform" type="translate" values="0 0;110 100;0 0" dur="56s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="0.22;0.76;0.22" dur="17s" repeatCount="indefinite"/>
    </use>
  </g>

  <rect width="2880" height="1880" filter="url(#grain)" opacity="0.22"/>

  <style>
    @media (prefers-reduced-motion: reduce) {
      animate,
      animateTransform {
        display: none;
      }
    }
  </style>
</svg>
